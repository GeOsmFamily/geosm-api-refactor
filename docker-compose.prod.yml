x-image: &api-image ${API_IMAGE:?Set API_IMAGE to the GHCR tag pushed by deploy.yml, e.g. ghcr.io/org/geosm-api-refactor:latest}
x-frontend-image: &frontend-image ${FRONTEND_IMAGE:?Set FRONTEND_IMAGE to the GHCR tag pushed by the frontend repo deploy.yml, e.g. ghcr.io/org/geosm-frontend-refactor:latest}

services:
  api:
    image: *api-image
    ports:
      # Uniquement joignable depuis le serveur lui-même : le frontend (nginx, voir son
      # Dockerfile) fait office de reverse proxy public et relaie /api/ -> api:3000 sur le
      # réseau Docker interne. Le port n'a donc pas besoin d'être exposé au-delà de localhost
      # (utile pour du debug SSH ponctuel, ex: curl localhost:3005/health depuis le VPS).
      - "127.0.0.1:${APP_PORT:-3005}:3000"
    depends_on:
      nominatim:
        condition: service_healthy
      osrm:
        condition: service_healthy

  # Lié à 127.0.0.1 comme les autres services : ce n'est PAS le port public final. Un reverse
  # proxy système (Apache/Nginx/Caddy, hors Docker, voir docs/deploiement.md section 6) écoute
  # sur 80/443 et relaie vers ce port. Sans le préfixe 127.0.0.1, ce port serait aussi
  # joignable directement depuis Internet (ex. http://<IP>:8080), contournant TLS/HSTS/headers
  # de sécurité posés par le reverse proxy système - d'où cette restriction.
  frontend:
    image: *frontend-image
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-80}:80"

  postgres:
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

  redis:
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"

  minio:
    ports:
      # Volontairement PUBLIC (0.0.0.0), à la différence de tous les autres services : les URLs
      # présignées renvoyées au navigateur (voir minio.service.ts) pointent directement sur ce
      # port (MINIO_PUBLIC_PORT) - un navigateur externe doit pouvoir l'atteindre pour que les
      # téléchargements (exports, documents, imports QGIS, raster) fonctionnent. Trafic HTTP
      # brut (pas de TLS sur ce port précis) - acceptable ici car les URLs sont présignées à
      # durée de vie limitée (voir docs/deploiement.md). Penser à ouvrir ce port dans le
      # firewall du VPS (ex. `ufw allow 9000/tcp`).
      - "${MINIO_PUBLIC_PORT:-9000}:9000"
      # Console d'admin MinIO - reste privée (127.0.0.1), jamais utilisée par le navigateur des
      # visiteurs, seulement pour de l'administration ponctuelle via tunnel SSH.
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"

  meilisearch:
    ports:
      - "127.0.0.1:${MEILISEARCH_PORT:-7700}:7700"

  qgis-server:
    ports:
      - "127.0.0.1:${QGIS_SERVER_PORT:-8380}:8080"

  grafana:
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"

  prometheus:
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"

  jaeger:
    ports:
      - "127.0.0.1:${JAEGER_UI_PORT:-16686}:16686"
      - "127.0.0.1:${JAEGER_OTLP_PORT:-4318}:4318"

  graylog:
    ports:
      - "127.0.0.1:${GRAYLOG_WEB_PORT:-9009}:9000"
      - "127.0.0.1:${GRAYLOG_GELF_PORT:-12201}:12201/udp"
    environment:
      GRAYLOG_HTTP_EXTERNAL_URI: http://localhost:${GRAYLOG_WEB_PORT:-9009}/

  # Auto-hébergement de Nominatim et OSRM (Lot P9) : en dev, l'application pointe encore sur
  # les serveurs publics de démo (nominatim.openstreetmap.org, router.project-osrm.org), dont
  # les politiques d'usage ("light testing only", 1 req/s) ne supportent pas un trafic réel.
  # Ces deux services remplacent ces serveurs publics en production. Voir
  # docs/deploiement.md pour la procédure complète d'import des données (extract régional).
  nominatim:
    image: mediagis/nominatim:4.5
    restart: unless-stopped
    environment:
      PBF_PATH: /nominatim/data/region-latest.osm.pbf
      NOMINATIM_PASSWORD: ${NOMINATIM_DB_PASSWORD:?Set NOMINATIM_DB_PASSWORD (internal postgres password for the Nominatim container, not related to the app's own database)}
      IMPORT_STYLE: full
      REPLICATION_URL: https://download.geofabrik.de/africa/cameroon-updates/
    volumes:
      # region-latest.osm.pbf est déposé manuellement (voir docs/deploiement.md) - le premier
      # démarrage du conteneur lance l'import complet (peut prendre 15-45 min pour un extract
      # pays), les démarrages suivants réutilisent les données déjà importées dans ce volume.
      # Pas ":ro" : l'entrypoint de l'image fait un "chown -R" sur ce dossier au démarrage, qui
      # échoue (et fait échouer tout le conteneur) si le montage est en lecture seule.
      - ./nominatim-source:/nominatim/data
      - nominatim-data:/var/lib/postgresql/14/main
    ports:
      - "127.0.0.1:${NOMINATIM_PORT:-8081}:8080"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4096M
        reservations:
          cpus: '0.5'
          memory: 1024M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/status.php"]
      interval: 30s
      timeout: 10s
      start_period: 30m
      retries: 5

  osrm:
    image: osrm/osrm-backend
    restart: unless-stopped
    # Les fichiers .osrm* servis ici sont pré-calculés une fois (hors de ce compose) par
    # scripts/setup-osrm-data.sh, qui exécute osrm-extract/partition/customize - osrm-routed
    # ne fait que servir un jeu de données déjà prêt, il ne l'importe jamais lui-même.
    command: osrm-routed --algorithm mld --max-table-size 1000 /data/region-latest.osrm
    volumes:
      - ./osrm-data:/data:ro
    ports:
      - "127.0.0.1:${OSRM_PORT:-5000}:5000"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2048M
        reservations:
          cpus: '0.25'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O- 'http://localhost:5000/route/v1/driving/11.5,3.8;11.6,3.9' | grep -q '\"code\":\"Ok\"'"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5

volumes:
  nominatim-data:
