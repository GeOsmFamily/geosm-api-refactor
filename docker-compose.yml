services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://geosm:geosm_secret@postgres:5432/geosm?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_ACCESS_SECRET=change-me-access-secret
      - JWT_REFRESH_SECRET=change-me-refresh-secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: geosm
      POSTGRES_USER: geosm
      POSTGRES_PASSWORD: geosm_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geosm"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_access
      MINIO_ROOT_PASSWORD: minio_secret
    volumes:
      - minio_data:/data
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:latest
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: masterKey
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped

  qgis-server:
    image: camptocamp/qgis-server:3.34
    ports:
      - "8380:8380"
    environment:
      QGIS_SERVER_LOG_LEVEL: 0
    restart: unless-stopped

  nominatim:
    image: mediagis/nominatim:4.4
    ports:
      - "8081:8080"
    environment:
      PBF_URL: https://download.geofabrik.de/africa/cameroon-latest.osm.pbf
      REPLICATION_URL: https://download.geofabrik.de/africa/cameroon-updates/
    volumes:
      - nominatim_data:/var/lib/postgresql/14/main
    restart: unless-stopped

  osrm:
    image: osrm/osrm-backend
    ports:
      - "5001:5000"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one
    ports:
      - "16686:16686"
      - "14268:14268"
    restart: unless-stopped

  mongo:
    image: mongo:6
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:2
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    restart: unless-stopped

  graylog:
    image: graylog/graylog:5.2
    ports:
      - "9009:9000"
      - "12201:12201/udp"
    environment:
      GRAYLOG_PASSWORD_SECRET: somepasswordpepper
      GRAYLOG_ROOT_PASSWORD_SHA2: 8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918
      GRAYLOG_HTTP_EXTERNAL_URI: http://localhost:9009/
      GRAYLOG_MONGODB_URI: mongodb://mongo:27017/graylog
      GRAYLOG_ELASTICSEARCH_HOSTS: http://opensearch:9200
    depends_on:
      - mongo
      - opensearch
    restart: unless-stopped

  apache:
    image: httpd:2.4
    ports:
      - "8080:80"
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_data:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 6h; done;'"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:
  nominatim_data:
  prometheus_data:
  grafana_data:
  mongo_data:
  opensearch_data:
  certbot_data:
