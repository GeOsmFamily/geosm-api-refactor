services:
  api:
    build: .
    ports:
      - "${APP_PORT:-3005}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      meilisearch:
        condition: service_healthy
      qgis-server:
        condition: service_healthy
    env_file: .env
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    volumes:
      - data-volume:/data
      - qgis-projects:/projects
      - qgis-styles:/qgis-styles

  # Servi par un dépôt séparé (geosm-frontend-refactor) - son propre pipeline CI construit et
  # pousse l'image sur GHCR (voir son deploy.yml). Doit rejoindre ce même réseau Docker Compose
  # car son nginx.conf relaie /api/ -> api:3000 et /ows -> qgis-server:8080 par nom d'hôte.
  # `image:` est fourni en dev par docker-compose.override.yml (non committé, voir
  # docs/deploiement.md) ou absent (le service ne démarre juste pas en dev sans le frontend
  # buildé localement) - en prod, docker-compose.prod.yml fixe l'image réelle depuis GHCR.
  frontend:
    image: ${FRONTEND_IMAGE:-geosm-frontend:local}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: geosm
      POSTGRES_USER: geosm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geosm_secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geosm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 64M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    command: server /data --console-address ":9001"
    ports:
      # MINIO_PUBLIC_PORT pilote aussi les URLs présignées renvoyées au navigateur (voir
      # minio.service.ts) - garder ce port publié en phase avec cette variable évite qu'un
      # remappage ici ne casse silencieusement les liens de téléchargement.
      - "${MINIO_PUBLIC_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/9000' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.6
    ports:
      - "${MEILISEARCH_PORT:-7700}:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-geosm-meilisearch-dev-key-2026}
      MEILI_ENV: ${MEILI_ENV:-development}
    volumes:
      - meili-data:/meili_data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7700/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 5

  qgis-server:
    image: 3liz/qgis-map-server:3.34
    ports:
      - "${QGIS_SERVER_PORT:-8380}:8080"
    volumes:
      - qgis-projects:/projects:ro
      - data-volume:/data:ro
    environment:
      QGSRV_SERVER_WORKERS: 2
      QGSRV_CACHE_ROOTDIR: /projects
      QGSRV_LOGGING_LEVEL: WARNING
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ows/?service=WMS&request=GetCapabilities || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5

  # --- Monitoring Stack ---

  grafana:
    image: grafana/grafana:10.2.0
    ports: ["${GRAFANA_PORT:-3001}:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.48.0
    ports: ["${PROMETHEUS_PORT:-9090}:9090"]
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  jaeger:
    image: jaegertracing/all-in-one:1.52
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_OTLP_PORT:-4318}:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped

  graylog:
    image: graylog/graylog:5.2
    ports:
      - "${GRAYLOG_WEB_PORT:-9009}:9000"
      - "${GRAYLOG_GELF_PORT:-12201}:12201/udp"
    environment:
      GRAYLOG_PASSWORD_SECRET: ${GRAYLOG_PASSWORD_SECRET:-somepasswordpepper1234567890abcdef}
      GRAYLOG_ROOT_PASSWORD_SHA2: ${GRAYLOG_ROOT_PASSWORD_SHA2:-8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918}
      GRAYLOG_HTTP_EXTERNAL_URI: http://localhost:${GRAYLOG_WEB_PORT:-9009}/
      GRAYLOG_MONGODB_URI: mongodb://mongodb:27017/graylog
      GRAYLOG_ELASTICSEARCH_HOSTS: http://opensearch:9200
    depends_on:
      mongodb:
        condition: service_started
      opensearch:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    volumes:
      - mongodb-data:/data/db
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms256m -Xmx256m
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    deploy:
      resources:
        limits:
          # 512M etait insuffisant : la distribution complete d'OpenSearch (tous les plugins,
          # pas juste le tas Java -Xmx256m) depasse ce plafond cgroup au demarrage et se fait
          # tuer par le noyau (OOM), independamment de la memoire libre sur le reste de l'hote -
          # symptome observe : "Killed" dans les logs, Graylog ne pouvant jamais le joindre.
          cpus: '1.0'
          memory: 1536M
        reservations:
          cpus: '0.25'
          memory: 512M
    restart: unless-stopped

  # Lot A8 admin (infra en lecture seule) : expose une API Docker restreinte au réseau interne
  # plutôt que de monter /var/run/docker.sock directement dans le conteneur api - même si l'API
  # était compromise, ce proxy refuse toute action d'écriture/contrôle (POST=0 ci-dessous), et
  # seules les infos conteneurs/images sont lisibles (pas de secrets, pas d'exec, pas de volumes).
  # Aucun port publié sur l'hôte : uniquement joignable par les autres services du même réseau
  # compose, via le nom de service "docker-socket-proxy:2375".
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    environment:
      CONTAINERS: 1
      IMAGES: 1
      INFO: 1
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

volumes:
  pgdata:
  redis-data:
  minio-data:
  meili-data:
  data-volume:
  qgis-projects:
  qgis-styles:
  grafana-data:
  prometheus-data:
  mongodb-data:
  opensearch-data:
