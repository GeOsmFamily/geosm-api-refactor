global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'geosm-api'
    static_configs:
      - targets: ['api:3000']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  # jaegertracing/all-in-one expose ses propres metriques Prometheus (spans recus/rejetes,
  # longueur de file, latence de requetage...) sur son port admin 14269, actif par defaut - pas
  # besoin de le publier sur l'hote, seul Prometheus (meme reseau Docker) doit y acceder.
  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269']
