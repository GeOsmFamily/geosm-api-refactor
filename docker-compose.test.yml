version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: geosm_test
      POSTGRES_USER: geosm
      POSTGRES_PASSWORD: geosm_test_secret
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U geosm -d geosm_test']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9002:9000'
    command: server /data
    entrypoint: >
      /bin/sh -c "
      minio server /data &
      sleep 3;
      mc alias set local http://localhost:9000 minioadmin minioadmin;
      mc mb local/geosm-test --ignore-existing;
      wait
      "
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10
