name: CI

on:
  push:
    branches: [main, dev, 'claude/**']
  pull_request:
    branches: [main, dev]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx --no prisma generate --schema=src/infrastructure/database/prisma/schema.prisma
      - run: npm run lint
      - run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: geosm_test
          POSTGRES_USER: geosm
          POSTGRES_PASSWORD: geosm_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U geosm"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://geosm:geosm_secret@localhost:5432/geosm_test?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: test-access-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx --no prisma generate --schema=src/infrastructure/database/prisma/schema.prisma
      - run: npx --no prisma db push --schema=src/infrastructure/database/prisma/schema.prisma --skip-generate
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  integration-tests:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: geosm_test
          POSTGRES_USER: geosm
          POSTGRES_PASSWORD: geosm_test_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U geosm -d geosm_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      meilisearch:
        image: getmeili/meilisearch:v1.6
        env:
          MEILI_MASTER_KEY: test-master-key
        ports:
          - 7700:7700
        options: >-
          --health-cmd="curl -f http://localhost:7700/health || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://geosm:geosm_test_secret@localhost:5432/geosm_test?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_URL: redis://localhost:6379
      MINIO_ENDPOINT: localhost
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: geosm-test
      MEILISEARCH_HOST: http://localhost:7700
      MEILISEARCH_API_KEY: test-master-key
      JWT_ACCESS_SECRET: test-access-secret-integration
      JWT_REFRESH_SECRET: test-refresh-secret-integration
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2024-01-16T16-07-38Z server /data
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live && break
            [ "$i" -eq 30 ] && echo "MinIO health check timeout" && exit 1
            sleep 2
          done
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx --no prisma generate --schema=src/infrastructure/database/prisma/schema.prisma
      - run: npx --no prisma db push --schema=src/infrastructure/database/prisma/schema.prisma --skip-generate
      - run: npx vitest run --config vitest.integration.config.ts

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx --no prisma generate --schema=src/infrastructure/database/prisma/schema.prisma
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: geosm-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
