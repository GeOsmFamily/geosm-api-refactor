name: Qualité du code

on:
  push:
    branches: [main, dev, 'claude/**']
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Linting ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx --no prisma generate --schema=src/infrastructure/database/prisma/schema.prisma
      - name: ESLint avec rapport
        run: npx eslint src/ --format json --output-file eslint-report.json || true
      - name: Vérification ESLint
        run: npm run lint
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eslint-report
          path: eslint-report.json
          retention-days: 14

  format:
    name: Formatage Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run format:check

  typecheck:
    name: Vérification TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx --no prisma generate --schema=src/infrastructure/database/prisma/schema.prisma
      - name: Vérification des types
        run: npx tsc --noEmit

  coverage:
    name: Couverture de code
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: geosm_test
          POSTGRES_USER: geosm
          POSTGRES_PASSWORD: geosm_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U geosm"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://geosm:geosm_secret@localhost:5432/geosm_test?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: test-access-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      ENCRYPTION_KEY: 1fd4dd4e826c626c3490401b0a8e6a164c09be5e6eb18d2d274164048f452fea
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx --no prisma generate --schema=src/infrastructure/database/prisma/schema.prisma
      - run: npx --no prisma db push --schema=src/infrastructure/database/prisma/schema.prisma --skip-generate
      - name: Tests avec couverture
        # --reporter=default en plus de json : le json seul écrit uniquement dans
        # test-results.json (non exporté en artefact), rendant les échecs de tests invisibles
        # dans les logs du job - vécu lors du diagnostic de ce workflow.
        run: npx vitest run --coverage --reporter=default --reporter=json --outputFile=test-results.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  duplicates:
    name: Détection de code dupliqué
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Détection de doublons (jscpd)
        run: npx jscpd src/ --reporters console --threshold 5 --min-lines 10 --min-tokens 50 || true
