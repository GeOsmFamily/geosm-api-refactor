name: Déploiement

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  version-tag:
    name: Création du tag de version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.tag }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Générer le tag de version
        id: version
        run: |
          DATE=$(date +'%Y%m%d')
          EXISTING=$(git tag -l "${DATE}.*" | sort -t. -k2 -n | tail -1)
          if [ -z "$EXISTING" ]; then
            BUILD_NUMBER=1
          else
            LAST_BUILD=$(echo "$EXISTING" | cut -d. -f2)
            BUILD_NUMBER=$((LAST_BUILD + 1))
          fi
          TAG="${DATE}.${BUILD_NUMBER}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "📦 Version: ${TAG}"

  test:
    name: Tests avant déploiement
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: geosm_test
          POSTGRES_USER: geosm
          POSTGRES_PASSWORD: geosm_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U geosm"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://geosm:geosm_secret@localhost:5432/geosm_test?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: test-access-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      ENCRYPTION_KEY: 1fd4dd4e826c626c3490401b0a8e6a164c09be5e6eb18d2d274164048f452fea
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx --no prisma generate --schema=src/infrastructure/database/prisma/schema.prisma
      - run: npx --no prisma db push --schema=src/infrastructure/database/prisma/schema.prisma --skip-generate
      - run: npm run test:coverage

  build-and-push:
    name: Build et push image Docker
    runs-on: ubuntu-latest
    needs: [version-tag, test]
    steps:
      - uses: actions/checkout@v4
      - name: Convertir le nom du repo en minuscules
        run: echo "REPO_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v4
      - name: Connexion au registre
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build et push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}:${{ needs.version-tag.outputs.version }}
            ghcr.io/${{ env.REPO_LC }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ needs.version-tag.outputs.version }}

  deploy:
    name: Déploiement sur le VPS de production
    runs-on: ubuntu-latest
    needs: [version-tag, build-and-push]
    # No-op tant que le VPS de prod n'est pas configuré : voir docs/deploiement.md pour la
    # checklist complète (secrets DEPLOY_SSH_HOST/DEPLOY_SSH_USER/DEPLOY_SSH_KEY/DEPLOY_PATH,
    # variable de repo DEPLOY_ENABLED=true). Avant ce lot, rien après build-and-push ne mettait
    # à jour un serveur réel - cette étape ferme ce trou.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Convertir le nom du repo en minuscules
        run: echo "REPO_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - name: Déployer via SSH (pull + up, avec vérification post-déploiement)
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: REPO_LC
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            export API_IMAGE="ghcr.io/${REPO_LC}:${{ needs.version-tag.outputs.version }}"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull api
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d api
            echo "Attente du healthcheck (jusqu'à 60s)..."
            for i in $(seq 1 15); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$(docker compose -f docker-compose.yml -f docker-compose.prod.yml ps -q api)" 2>/dev/null || echo "starting")
              if [ "$STATUS" = "healthy" ]; then
                echo "✅ Déploiement réussi (${API_IMAGE})"
                exit 0
              fi
              sleep 4
            done
            echo "❌ Healthcheck échoué après déploiement - revert vers :latest précédent"
            export API_IMAGE="ghcr.io/${REPO_LC}:latest"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d api
            exit 1

  create-tag:
    name: Créer le tag Git
    runs-on: ubuntu-latest
    needs: [version-tag, build-and-push]
    steps:
      - uses: actions/checkout@v4
      - name: Créer et pousser le tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.version-tag.outputs.version }}" -m "Release ${{ needs.version-tag.outputs.version }}"
          git push origin "${{ needs.version-tag.outputs.version }}"

  create-release:
    name: Créer la release GitHub
    runs-on: ubuntu-latest
    needs: [version-tag, create-tag]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Convertir le nom du repo en minuscules
        run: echo "REPO_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - name: Générer les notes de release
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --oneline "$PREV_TAG"..HEAD)
          else
            CHANGES=$(git log --oneline -20)
          fi
          {
            echo "changes<<EOF"
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Créer la release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version-tag.outputs.version }}
          name: "GeOSM API v${{ needs.version-tag.outputs.version }}"
          body: |
            ## 🚀 Release ${{ needs.version-tag.outputs.version }}

            ### Image Docker
            ```
            ghcr.io/${{ env.REPO_LC }}:${{ needs.version-tag.outputs.version }}
            ```

            ### Changements
            ${{ steps.notes.outputs.changes }}
          draft: false
          prerelease: false
