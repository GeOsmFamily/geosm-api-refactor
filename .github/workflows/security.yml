name: Sécurité

on:
  push:
    branches: [main, dev, 'claude/**']
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  audit:
    name: Audit des dépendances
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Audit npm (vulnérabilités connues)
        run: npm audit --audit-level=high || true
      - name: Rapport d'audit détaillé
        run: npm audit --json > npm-audit-report.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 30

  secrets-scan:
    name: Détection de secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Installer Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar xz
          sudo mv gitleaks /usr/local/bin/
      - name: Scan des secrets dans le code
        run: gitleaks detect --source . --report-format json --report-path gitleaks-report.json --verbose || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30

  sast:
    name: Analyse statique de sécurité
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx --no prisma generate --schema=src/infrastructure/database/prisma/schema.prisma
      - name: Analyse de sécurité (ESLint security plugins)
        run: |
          npm install --no-save eslint-plugin-security eslint-plugin-no-unsanitized 2>/dev/null || true
          echo "=== Vérification des patterns de sécurité ==="
          echo ""
          echo "--- eval() et Function() ---"
          grep -rn 'eval(' src/ --include='*.ts' | grep -v node_modules || echo "Aucun usage de eval()"
          echo ""
          echo "--- Accès fichier non sécurisé ---"
          grep -rn 'fs\.\(readFile\|writeFile\|unlink\|rmdir\)' src/ --include='*.ts' | grep -v node_modules || echo "Aucun accès fichier direct suspect"
          echo ""
          echo "--- Secrets potentiels hardcodés ---"
          grep -rn -i 'password\s*=\s*["\x27][^"\x27]\+["\x27]' src/ --include='*.ts' | grep -v node_modules | grep -v '.test.' | grep -v 'interface\|type\|@' || echo "Aucun secret hardcodé détecté"
          echo ""
          echo "--- child_process / exec ---"
          grep -rn 'child_process\|\.exec(' src/ --include='*.ts' | grep -v node_modules || echo "Aucun usage de child_process"
          echo ""
          echo "--- Headers de sécurité manquants ---"
          grep -rn 'helmet\|cors\|csrf' src/ --include='*.ts' | head -5 || echo "⚠️ Vérifiez la configuration des headers de sécurité"
      - name: Vérification des permissions de fichiers sensibles
        run: |
          echo "=== Fichiers sensibles dans le repo ==="
          find . -name '.env' -o -name '.env.*' -o -name '*.pem' -o -name '*.key' | grep -v node_modules | grep -v .git || echo "Aucun fichier sensible trouvé"

  docker-security:
    name: Scan image Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx --no prisma generate --schema=src/infrastructure/database/prisma/schema.prisma
      - uses: docker/setup-buildx-action@v3
      - name: Build image Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: geosm-api:security-scan
      - name: Scan Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'geosm-api:security-scan'
          format: 'table'
          severity: 'CRITICAL'
          trivyignores: '.trivyignore'
          # Avant ce lot, exit-code: '0' faisait que ce job ne pouvait JAMAIS échouer quel que
          # soit le nombre de vulnérabilités trouvées - le scan tournait mais ne bloquait rien.
          # On ne bloque que sur CRITICAL (pas HIGH) pour éviter de casser le pipeline sur des
          # CVE tierces sans correctif disponible - à ajuster si trop de faux positifs.
          exit-code: '1'

  sql-injection-check:
    name: Vérification injection SQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Recherche de patterns SQL dangereux
        run: |
          echo "=== Vérification des requêtes SQL non paramétrées ==="
          echo ""
          echo "Fichiers utilisant \$queryRawUnsafe :"
          grep -rn '\$queryRawUnsafe' src/ || echo "Aucun trouvé"
          echo ""
          echo "Fichiers utilisant \$executeRawUnsafe :"
          grep -rn '\$executeRawUnsafe' src/ || echo "Aucun trouvé"
          echo ""
          echo "Interpolation de string dans les requêtes SQL (potentiel injection) :"
          grep -rn '\$queryRawUnsafe.*\${' src/ || echo "Aucun trouvé"
          grep -rn '\$executeRawUnsafe.*\${' src/ || echo "Aucun trouvé"
          echo ""
          echo "⚠️  Vérifiez que toutes les entrées utilisateur sont sanitizées."
