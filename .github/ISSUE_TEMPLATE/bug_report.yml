name: "🐛 Rapport de bug"
description: "Signaler un bug ou un comportement inattendu"
labels: ["bug", "à trier"]
body:
  - type: markdown
    attributes:
      value: |
        Merci de prendre le temps de remplir ce rapport de bug.
  - type: textarea
    id: description
    attributes:
      label: Description du bug
      description: "Décrivez clairement le bug rencontré."
      placeholder: "Quand je fais X, il se passe Y au lieu de Z."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      description: "Listez les étapes pour reproduire le bug."
      placeholder: |
        1. Envoyer une requête POST à /api/...
        2. Avec le body suivant : {...}
        3. Observer l'erreur
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
      description: "Décrivez ce qui devrait se passer normalement."
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Comportement actuel
      description: "Décrivez ce qui se passe réellement."
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Sévérité
      options:
        - Critique (bloque la production)
        - Majeur (fonctionnalité cassée)
        - Mineur (contournement possible)
        - Cosmétique
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environnement
      description: "Version de Node.js, OS, navigateur, etc."
      placeholder: |
        - Node.js: 22.x
        - OS: Ubuntu 24.04
        - Docker: 27.x
  - type: textarea
    id: logs
    attributes:
      label: Logs / Captures d'écran
      description: "Collez ici les logs pertinents ou ajoutez des captures d'écran."
      render: shell
